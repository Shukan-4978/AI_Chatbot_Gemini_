services:
  backend:
    build: ./backend
    ports:
      - "1111:1111"
    environment:
      - PORT=1111
      - MONGODB_URI=${MONGODB_URI}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - FRONTEND_URL=http://localhost

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:1111/api/chats
    ports:
      - "80:80"
    depends_on:
      - backend
